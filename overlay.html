<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay - Valorant Team Manager</title>
    <base href="./">
    <link rel="stylesheet" href="styles.css">
    <script src="js/models/Round.js"></script>
    <script src="js/models/Match.js"></script>
    <script src="js/utils/constants.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: rgba(23, 31, 38, 0.95);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .overlay-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }
        
        .overlay-header {
            background: rgba(255, 70, 85, 0.2);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent-color);
            -webkit-app-region: drag;
            cursor: move;
        }
        
        .overlay-header h3 {
            margin: 0;
            font-size: 14px;
            color: var(--accent-color);
            font-weight: 600;
        }
        
        .overlay-controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }
        
        .overlay-btn {
            background: rgba(255, 70, 85, 0.3);
            border: 1px solid var(--accent-color);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .overlay-btn:hover {
            background: rgba(255, 70, 85, 0.5);
        }
        
        .overlay-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-app-region: no-drag;
        }
        
        .overlay-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .overlay-tab {
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .overlay-tab.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }
        
        .overlay-tab-content {
            display: none;
        }
        
        .overlay-tab-content.active {
            display: block;
        }
        
        .overlay-section {
            margin-bottom: 15px;
            background: rgba(26, 26, 26, 0.6);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid var(--border-color);
        }
        
        .overlay-section h4 {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: var(--accent-color);
            font-weight: 600;
        }
        
        .overlay-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
            box-sizing: border-box;
            pointer-events: auto;
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }
        
        .overlay-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: var(--bg-secondary);
        }
        
        .overlay-input:disabled,
        .overlay-input[readonly] {
            pointer-events: none;
            opacity: 0.6;
        }
        
        /* S'assurer que les inputs sont toujours interactifs */
        input.overlay-input,
        textarea.overlay-input {
            -webkit-app-region: no-drag;
            pointer-events: auto !important;
            user-select: text !important;
            -webkit-user-select: text !important;
        }
        
        .overlay-select {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
            box-sizing: border-box;
        }
        
        .overlay-select:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        
        .quick-action-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            text-align: left;
        }
        
        .quick-action-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-color);
        }
        
        .round-item {
            background: var(--bg-tertiary);
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        
        .round-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .round-number {
            font-weight: 600;
            color: var(--accent-color);
        }
        
        .round-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }
        
        .round-controls select {
            padding: 4px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 11px;
        }
        
        .round-note-input {
            width: 100%;
            padding: 4px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 11px;
            box-sizing: border-box;
        }
        
        .btn-small {
            padding: 6px 10px;
            background: var(--accent-color);
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
        }
        
        .btn-small:hover {
            background: var(--accent-hover);
        }
        
        .strategy-content {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .strategy-item {
            padding: 8px;
            margin-bottom: 6px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .strategy-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="overlay-header">
            <h3>🎯 Mode Overlay</h3>
            <div class="overlay-controls">
                <button class="overlay-btn" id="minimizeBtn">−</button>
                <button class="overlay-btn" id="closeBtn">×</button>
            </div>
        </div>
        <div class="overlay-content">
            <div class="overlay-tabs">
                <button class="overlay-tab active" data-tab="match">📊 Match</button>
                <button class="overlay-tab" data-tab="strategy">🧠 Stratégie</button>
            </div>
            
            <!-- Onglet Match -->
            <div class="overlay-tab-content active" id="matchTab">
                <div class="overlay-section">
                    <h4>📋 Liste des Matchs</h4>
                    <select class="overlay-select" id="matchesList">
                        <option value="">Sélectionner un match</option>
                    </select>
                    <button class="quick-action-btn" id="loadMatchBtn">📂 Charger Match</button>
                </div>
                
                <div class="overlay-section">
                    <h4>📝 Informations du Match</h4>
                    <input type="text" class="overlay-input" id="matchDate" placeholder="Date (DD-MM-YYYY)">
                    <select class="overlay-select" id="matchMap">
                        <option value="">Sélectionner une map</option>
                    </select>
                    <input type="text" class="overlay-input" id="matchOpponent" placeholder="Adversaire">
                    <button class="quick-action-btn" id="createMatchBtn">➕ Créer/Modifier Match</button>
                </div>
                
                <div class="overlay-section" id="roundsSection" style="display: none;">
                    <h4>🎯 Rounds</h4>
                    <div id="roundsList"></div>
                    <button class="quick-action-btn" id="addRoundBtn">➕ Ajouter Round</button>
                    <button class="quick-action-btn" id="saveRoundsBtn">💾 Sauvegarder Rounds</button>
                </div>
            </div>
            
            <!-- Onglet Stratégie -->
            <div class="overlay-tab-content" id="strategyTab">
                <div class="overlay-section">
                    <h4>🎯 Valoplants</h4>
                    <select class="overlay-select" id="valoplantsMapSelect">
                        <option value="">Sélectionner une map</option>
                    </select>
                    <select class="overlay-select" id="valoplantsSideSelect">
                        <option value="attack">Attaque</option>
                        <option value="defense">Défense</option>
                    </select>
                    <div class="strategy-content" id="valoplantsContent"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { ipcRenderer } = require('electron');
        let currentMatch = null;
        let teamData = null;
        let rounds = [];
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            initMatchForm();
            loadTeamData();
            setupEventListeners();
        });
        
        function initTabs() {
            document.querySelectorAll('.overlay-tab[data-tab]').forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;
                    document.querySelectorAll('.overlay-tab[data-tab]').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.overlay-tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tabName + 'Tab').classList.add('active');
                });
            });
        }
        
        function initMatchForm() {
            // Remplir les selects de maps
            const mapSelects = document.querySelectorAll('#matchMap, #valoplantsMapSelect');
            const maps = ['Abyss', 'Ascent', 'Bind', 'Corrode', 'Haven', 'Lotus', 'Sunset', 'Icebox', 'Breeze', 'Fracture', 'Pearl', 'Split'];
            maps.forEach(map => {
                mapSelects.forEach(select => {
                    if (select) {
                        const option = document.createElement('option');
                        option.value = map;
                        option.textContent = map;
                        select.appendChild(option);
                    }
                });
            });
        }
        
        async function loadTeamData() {
            try {
                const data = await ipcRenderer.invoke('get-overlay-data');
                if (data && data.team) {
                    teamData = data.team;
                    updateMatchesList();
                }
            } catch (err) {
                console.error('Erreur lors du chargement des données:', err);
            }
        }
        
        function updateMatchesList() {
            if (!teamData || !teamData.matches) return;
            const select = document.getElementById('matchesList');
            select.innerHTML = '<option value="">Sélectionner un match</option>';
            teamData.matches.forEach((match, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${match.date} - ${match.map} vs ${match.opponent} (${match.score || 'N/A'})`;
                select.appendChild(option);
            });
        }
        
        function setupEventListeners() {
            document.getElementById('closeBtn').addEventListener('click', () => window.close());
            
            document.getElementById('minimizeBtn').addEventListener('click', () => {
                const content = document.querySelector('.overlay-content');
                content.style.display = content.style.display === 'none' ? 'block' : 'none';
            });
            
            document.getElementById('loadMatchBtn').addEventListener('click', loadSelectedMatch);
            document.getElementById('createMatchBtn').addEventListener('click', createOrUpdateMatch);
            document.getElementById('addRoundBtn').addEventListener('click', addRound);
            document.getElementById('saveRoundsBtn').addEventListener('click', saveRounds);
            
            document.getElementById('valoplantsMapSelect').addEventListener('change', loadValoplants);
            document.getElementById('valoplantsSideSelect').addEventListener('change', loadValoplants);
        }
        
        function loadSelectedMatch() {
            const select = document.getElementById('matchesList');
            const matchIndex = parseInt(select.value);
            if (isNaN(matchIndex) || !teamData || !teamData.matches || !teamData.matches[matchIndex]) {
                alert('Veuillez sélectionner un match valide');
                return;
            }
            
            const match = teamData.matches[matchIndex];
            const dateInput = document.getElementById('matchDate');
            const mapSelect = document.getElementById('matchMap');
            const opponentInput = document.getElementById('matchOpponent');
            
            if (dateInput) {
                dateInput.value = match.date || '';
                dateInput.removeAttribute('readonly');
                dateInput.removeAttribute('disabled');
            }
            if (mapSelect) {
                mapSelect.value = match.map || '';
            }
            if (opponentInput) {
                opponentInput.value = match.opponent || '';
                opponentInput.removeAttribute('readonly');
                opponentInput.removeAttribute('disabled');
            }
            
            // Charger les rounds
            rounds = (match.rounds || []).map((r, index) => {
                // S'assurer que round_number est défini, sinon utiliser l'index + 1
                let roundNum = r.round_number;
                if (roundNum === undefined || roundNum === null) {
                    roundNum = r.roundNumber;
                }
                if (roundNum === undefined || roundNum === null || roundNum === 0) {
                    roundNum = index + 1;
                }
                return {
                    round_number: roundNum,
                    winner: r.winner || '',
                    side: r.side || '',
                    type: r.type || '',
                    note: r.note || ''
                };
            });
            
            if (rounds.length === 0) {
                // Créer 13 rounds par défaut si aucun round
                for (let i = 1; i <= 13; i++) {
                    rounds.push({
                        round_number: i,
                        winner: '',
                        side: '',
                        type: '',
                        note: ''
                    });
                }
            } else {
                // S'assurer que tous les rounds ont un numéro valide
                rounds.forEach((round, index) => {
                    if (!round.round_number || round.round_number === 0) {
                        round.round_number = index + 1;
                    }
                });
            }
            
            currentMatch = match;
            renderRounds();
            document.getElementById('roundsSection').style.display = 'block';
        }
        
        async function createOrUpdateMatch() {
            const date = document.getElementById('matchDate').value;
            const map = document.getElementById('matchMap').value;
            const opponent = document.getElementById('matchOpponent').value;
            
            if (!date || !map || !opponent) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            // Créer ou mettre à jour le match
            const matchData = {
                date: date,
                map: map,
                opponent: opponent,
                score: '',
                result: '',
                rounds: rounds.length > 0 ? rounds : []
            };
            
            // Envoyer au main process
            ipcRenderer.send('overlay-action', {
                action: 'create-match',
                match: matchData
            });
            
            // Afficher la section des rounds
            document.getElementById('roundsSection').style.display = 'block';
            currentMatch = matchData;
            
            // Si pas de rounds, en créer 13 par défaut
            if (rounds.length === 0) {
                for (let i = 1; i <= 13; i++) {
                    addRound();
                }
            } else {
                renderRounds();
            }
        }
        
        function addRound() {
            const roundNumber = rounds.length + 1;
            const round = {
                round_number: roundNumber,
                winner: '',
                side: '',
                type: '',
                note: ''
            };
            rounds.push(round);
            renderRounds();
        }
        
        function renderRounds() {
            const container = document.getElementById('roundsList');
            container.innerHTML = '';
            
            rounds.forEach((round, index) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'round-item';
                roundDiv.innerHTML = `
                    <div class="round-header">
                        <span class="round-number">Round ${round.round_number}</span>
                        <button class="btn-small" onclick="deleteRound(${index})">🗑️</button>
                    </div>
                    <div class="round-controls">
                        <select onchange="updateRound(${index}, 'winner', this.value)">
                            <option value="">Gagnant</option>
                            <option value="Nous" ${round.winner === 'Nous' ? 'selected' : ''}>Nous</option>
                            <option value="Adversaire" ${round.winner === 'Adversaire' ? 'selected' : ''}>Adversaire</option>
                        </select>
                        <select onchange="updateRound(${index}, 'side', this.value)">
                            <option value="">Côté</option>
                            <option value="Attaque" ${round.side === 'Attaque' ? 'selected' : ''}>Attaque</option>
                            <option value="Défense" ${round.side === 'Défense' ? 'selected' : ''}>Défense</option>
                        </select>
                        <select onchange="updateRound(${index}, 'type', this.value)">
                            <option value="">Type</option>
                            <option value="Gun" ${(round.type === 'Gun' || round.type === 'gun') ? 'selected' : ''}>Gun</option>
                            <option value="Eco" ${(round.type === 'Eco' || round.type === 'eco') ? 'selected' : ''}>Eco</option>
                            <option value="Anti-eco" ${(round.type === 'Anti-eco' || round.type === 'anti-eco' || round.type === 'Anti-eco') ? 'selected' : ''}>Anti-eco</option>
                            <option value="Bonus" ${(round.type === 'Bonus' || round.type === 'bonus') ? 'selected' : ''}>Bonus</option>
                            <option value="Full Buy" ${(round.type === 'Full Buy' || round.type === 'full buy') ? 'selected' : ''}>Full Buy</option>
                            <option value="Force Buy" ${(round.type === 'Force Buy' || round.type === 'force buy') ? 'selected' : ''}>Force Buy</option>
                        </select>
                    </div>
                    <input type="text" class="round-note-input" placeholder="Note..." value="${round.note || ''}" onchange="updateRound(${index}, 'note', this.value)">
                `;
                container.appendChild(roundDiv);
            });
        }
        
        function updateRound(index, field, value) {
            if (rounds[index]) {
                rounds[index][field] = value;
            }
        }
        
        function deleteRound(index) {
            rounds.splice(index, 1);
            // Renuméroter les rounds
            rounds.forEach((round, i) => {
                round.round_number = i + 1;
            });
            renderRounds();
        }
        
        function saveRounds() {
            if (!currentMatch) {
                alert('Veuillez d\'abord créer un match');
                return;
            }
            
            currentMatch.rounds = rounds;
            
            ipcRenderer.send('overlay-action', {
                action: 'save-match',
                match: currentMatch
            });
        }
        
        function loadValoplants() {
            const map = document.getElementById('valoplantsMapSelect').value;
            const side = document.getElementById('valoplantsSideSelect').value || 'attack';
            if (!map) {
                document.getElementById('valoplantsContent').innerHTML = '<p style="color: var(--text-secondary); font-size: 11px;">Sélectionnez une map</p>';
                return;
            }
            
            try {
                // Charger depuis localStorage avec la clé strategy_{side}_images_{map}
                const storageKey = `strategy_${side}_images_${map}`;
                const raw = localStorage.getItem(storageKey);
                const images = raw ? JSON.parse(raw) : [];
                const container = document.getElementById('valoplantsContent');
                container.innerHTML = '';
                
                if (!Array.isArray(images) || images.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary); font-size: 11px;">Aucun valoplant pour cette map et ce côté</p>';
                } else {
                    images.forEach((img, index) => {
                        const item = document.createElement('div');
                        item.className = 'strategy-item';
                        item.style.cursor = 'pointer';
                        item.innerHTML = `
                            <img src="${img.src}" style="width: 100%; max-height: 150px; object-fit: contain; margin-bottom: 5px; border-radius: 4px;" alt="Valoplant ${index + 1}">
                            <small style="color: var(--text-secondary); font-size: 10px;">${img.note || 'Aucune note'}</small>
                        `;
                        item.addEventListener('click', () => {
                            // Ouvrir l'image en grand
                            const modal = window.open('', '_blank');
                            modal.document.write(`<html><head><title>Valoplant</title></head><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;"><img src="${img.src}" style="max-width:100%;max-height:100%;object-fit:contain;"></body></html>`);
                        });
                        container.appendChild(item);
                    });
                }
            } catch (err) {
                console.error('Erreur lors du chargement des valoplants:', err);
                document.getElementById('valoplantsContent').innerHTML = '<p style="color: var(--error-color); font-size: 11px;">Erreur lors du chargement</p>';
            }
        }
        
        // Exposer les fonctions globalement
        window.updateRound = updateRound;
        window.deleteRound = deleteRound;
    </script>
</body>
</html>
